<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure QR Share</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f14;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
    }
    .icon-plain    { background: rgba(16,185,129,0.15); }
    .icon-encrypt  { background: rgba(108,99,255,0.15); }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p  { font-size: 15px; color: rgba(255,255,255,0.5); line-height: 1.5; margin-bottom: 32px; }
    .text-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px;
      font-size: 18px;
      font-family: monospace;
      word-break: break-all;
      margin-bottom: 24px;
      cursor: pointer;
      text-align: left;
    }
    .btn {
      display: block;
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      padding: 16px 32px;
      border-radius: 16px;
      width: 100%;
      color: #fff;
    }
    .btn-copy    { background: linear-gradient(135deg, #10b981, #059669); }
    .btn-copied  { background: #059669; }
    .btn-install { background: linear-gradient(135deg, #6c63ff, #3b82f6); text-decoration: none; display: block; }
    .btn:active  { opacity: 0.85; }
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: rgba(255,255,255,0.2); font-size: 13px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon icon-encrypt" id="icon">🔒</div>
    <h1 id="title">Secure QR Share</h1>
    <p id="subtitle">You've scanned a secure QR code. Install the Secure QR Share app to decrypt it.</p>
    <div id="text-box" class="text-box" style="display:none"></div>
    <button id="copy-btn" class="btn btn-copy" style="display:none" onclick="copyText()">Copy to Clipboard</button>
    <div id="divider" class="divider" style="display:none">also</div>
    <a id="store-btn" class="btn btn-install" href="#">Get Secure QR Share</a>
  </div>

  <script>
    var playStore = 'https://play.google.com/store/apps/details?id=com.example.secureqrshare';
    var appStore  = 'https://apps.apple.com/app/TODO';

    var ua = navigator.userAgent || '';
    var storeBtn = document.getElementById('store-btn');
    if (/android/i.test(ua)) {
      storeBtn.href = playStore;
    } else if (/iphone|ipad|ipod/i.test(ua)) {
      storeBtn.href = appStore;
    } else {
      storeBtn.href = playStore;
    }

    // Parse ?data= from URL
    var params = new URLSearchParams(window.location.search);
    var data = params.get('data');

    if (data && data.startsWith('PLAIN:')) {
      var b64 = data.slice('PLAIN:'.length);
      var plainText = null;
      try {
        plainText = decodeURIComponent(escape(atob(b64)));
      } catch (e) {}

      if (plainText !== null) {
        document.getElementById('icon').className = 'icon icon-plain';
        document.getElementById('icon').textContent = '📋';
        document.getElementById('title').textContent = 'Text Copied!';
        document.getElementById('subtitle').textContent = 'Tap the text or the button below to copy it.';
        document.getElementById('store-btn').style.display = 'none';

        var box = document.getElementById('text-box');
        box.textContent = plainText;
        box.style.display = 'block';
        box.onclick = copyText;

        document.getElementById('copy-btn').style.display = 'block';
        document.getElementById('divider').style.display = 'flex';
        document.getElementById('store-btn').style.display = 'block';

        // Try auto-copy (works if page was opened by user gesture like scanning)
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(plainText).then(function() {
            document.getElementById('title').textContent = 'Copied!';
            document.getElementById('copy-btn').textContent = 'Copied!';
            document.getElementById('copy-btn').className = 'btn btn-copied';
          }).catch(function() {});
        }

        window._plainText = plainText;
      }
    }

    function copyText() {
      if (!window._plainText) return;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(window._plainText).then(function() {
          document.getElementById('title').textContent = 'Copied!';
          document.getElementById('copy-btn').textContent = 'Copied!';
          document.getElementById('copy-btn').className = 'btn btn-copied';
        });
      } else {
        // Fallback for older browsers
        var ta = document.createElement('textarea');
        ta.value = window._plainText;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        document.getElementById('title').textContent = 'Copied!';
        document.getElementById('copy-btn').textContent = 'Copied!';
        document.getElementById('copy-btn').className = 'btn btn-copied';
      }
    }
  </script>
</body>
</html>
